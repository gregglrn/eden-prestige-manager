<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Clients</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="sidebar">

<h2>🌿 EDEN PRESTIGE</h2>

<a href="/">📄 Nouveau devis</a>

<a href="/clients">👤 Clients</a>

</div>

<div class="content">

<h1>Clients</h1>

<div class="bloc">

<form action="/ajouter_client" method="POST">

<input
name="nom"
placeholder="Nom">

<input
name="adresse"
placeholder="Adresse">

<input
name="cp"
placeholder="Code Postal">

<input
name="ville"
placeholder="Ville">

<input
name="telephone"
placeholder="Téléphone">

<input
name="email"
placeholder="Email">

<br><br>

<input
class="valider"
type="submit"
value="Ajouter">

</form>

</div>

<br>

<div class="bloc">

<table>

<tr>

<th>Nom</th>

<th>Téléphone</th>

<th>Email</th>

</tr>

{% for client in clients %}

<tr>

<td>{{client.nom}}</td>

<td>{{client.telephone}}</td>

<td>{{client.email}}</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
