<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Eden Prestige Paysage</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

{% extends "base.html" %}

{% block contenu %}

<div class="content">

<h1>Nouveau devis</h1>

<form action="/devis" method="POST">

<div class="bloc">

<h2>Informations client</h2>

<label>Nom</label>
<div class="position-relative">

<input
    id="nom"
    name="nom"
    autocomplete="off">

<div
    id="listeClients"
    class="liste-clients">

</div>

</div>

<div id="suggestions"></div>

<label>Adresse</label>
<input id="adresse" name="adresse_client">

<label>Code postal</label>
<input id="cp" name="cp">

<label>Ville</label>
<input id="ville" name="ville">

<label>Téléphone</label>
<input id="telephone" name="telephone">

<label>Email</label>
<input id="mail" name="mail">

</div>

<br>

<div class="bloc">

<h2>Prestations</h2>

<table id="prestations">

<thead>

<tr>

<th>Désignation</th>

<th>Unité</th>

<th>Qté</th>

<th>Prix</th>

<th>Total</th>

<th></th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<div class="totaux">

    <div>

        Sous-total

        <span id="sousTotal">

            0.00 €

        </span>

    </div>

    <div>

        Remise

        <input
            id="remise"
            type="number"
            value="0"
            step="0.01">

    </div>

    <div class="grandTotal">

        Total

        <span id="grandTotal">

            0.00 €

        </span>

    </div>

</div>

<br>

<button
type="button"
onclick="ajouterLigne()">

➕ Ajouter une ligne

</button>

</div>

<br>

<input
class="valider"
type="submit"
value="Créer le devis">

</form>

</div>

<script>

    let catalogue = [];

fetch("/api/prestations")
    .then(r => r.json())
    .then(data => {

        catalogue = data;

        ajouterLigne();

    });

let tbody = document.querySelector("#prestations tbody");

function ajouterLigne(){

let ligne=document.createElement("tr");

ligne.innerHTML = `

<td>

<select class="prestationSelect" onchange="selectionPrestation(this)">

<option value="">-- Choisir --</option>

${catalogue.map((p,index)=>`
<option value="${p.id}">
${p.designation}
</option>
`).join("")}

</select>

<input
    type="hidden"
    name="prestation_id[]">

</td>

<td>

<input name="unite[]" readonly>

</td>

<td>

<input
type="number"
name="quantite[]"
value="1"
min="1"
oninput="calculer()">

</td>

<td>

<input
type="number"
name="prix[]"
step="0.01"
value="0"
oninput="calculer()">

</td>

<td class="ligneTotal">

0.00 €

</td>

<td>

<button
type="button"
onclick="supprimer(this)">

❌

</button>

</td>

`;

tbody.appendChild(ligne);

calculer();

}

function supprimer(btn){

btn.parentNode.parentNode.remove();

calculer();

}

function calculer(){

let total=0;

document.querySelectorAll("#prestations tbody tr").forEach(function(row){

let q=parseFloat(row.querySelector('input[name="quantite[]"]').value)||0;

let p=parseFloat(row.querySelector('input[name="prix[]"]').value)||0;

let ligne=q*p;

row.querySelector(".ligneTotal").innerHTML=

ligne.toFixed(2)+" €";

total+=ligne;

});

document.getElementById("sousTotal").innerHTML=

total.toFixed(2)+" €";

let remise=parseFloat(

document.getElementById("remise").value

)||0;

document.getElementById("grandTotal").innerHTML=

(total-remise).toFixed(2)+" €";

}

document
.getElementById("remise")
.addEventListener("input",calculer);

let clients = [];

fetch("/api/clients")
.then(r=>r.json())
.then(data=>{

    clients=data;

});

function selectionPrestation(select){

    let id = parseInt(select.value);

    let prestation = catalogue.find(p => p.id === id);

    if(!prestation)
        return;

    let ligne = select.closest("tr");

    ligne.querySelector('input[name="prestation_id[]"]').value =
        prestation.id;

    ligne.querySelector('input[name="unite[]"]').value =
        prestation.unite;

    ligne.querySelector('input[name="prix[]"]').value =
        prestation.prix;

    calculer();
}

document
.getElementById("nom")
.addEventListener("input", function () {

    const texte = this.value.toLowerCase();

    const liste = document.getElementById("listeClients");

    liste.innerHTML = "";

    if (texte.length < 2) {

        liste.style.display = "none";
        return;

    }

    const resultat = clients.filter(c =>

        c.nom.toLowerCase().includes(texte)

    );

    resultat.forEach(client => {

        let div = document.createElement("div");

        div.innerHTML = client.nom;

        div.onclick = function(){

            document.getElementById("nom").value = client.nom;

            document.getElementById("adresse").value = client.adresse;

            document.getElementById("cp").value = client.cp;

            document.getElementById("ville").value = client.ville;

            document.getElementById("telephone").value = client.telephone;

            document.getElementById("mail").value = client.email;

            liste.style.display = "none";

        }

        liste.appendChild(div);

    });

    liste.style.display = "block";

});

</script>


{% endblock %}
</body>

</html>
