{% extends "base.html" %}

{% block contenu %}
<h1>Clients</h1>

<div class="bloc">
    <form action="/ajouter_client" method="POST" class="form-stack">
        <input name="nom" placeholder="Nom" required>
        <input name="adresse" placeholder="Adresse">
        <div class="form-grid">
            <input name="cp" placeholder="Code postal">
            <input name="ville" placeholder="Ville">
        </div>
        <div class="form-grid">
            <input name="telephone" placeholder="T&eacute;l&eacute;phone">
            <input name="email" placeholder="Email">
        </div>
        <input class="valider" type="submit" value="Ajouter">
    </form>
</div>

<div class="bloc">
    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>T&eacute;l&eacute;phone</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
                <tr>
                    <td>{{ client.nom }}</td>
                    <td>{{ client.telephone }}</td>
                    <td>{{ client.email }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
