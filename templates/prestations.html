{% extends "base.html" %}

{% block contenu %}
<h1>Catalogue des prestations</h1>

<div class="bloc">
    <form action="/ajouter_prestation" method="POST" class="form-stack">
        <label>D&eacute;signation</label>
        <input name="designation" required>
        <div class="form-grid">
            <div>
                <label>Unit&eacute;</label>
                <input name="unite">
            </div>
            <div>
                <label>Prix</label>
                <input type="number" step="0.01" min="0" name="prix" required>
            </div>
        </div>
        <input class="valider" type="submit" value="Ajouter">
    </form>
</div>

<div class="bloc">
    <table>
        <thead>
            <tr>
                <th>D&eacute;signation</th>
                <th>Unit&eacute;</th>
                <th>Prix</th>
            </tr>
        </thead>
        <tbody>
            {% for p in prestations %}
                <tr>
                    <td>{{ p.designation }}</td>
                    <td>{{ p.unite }}</td>
                    <td>{{ "%.2f"|format(p.prix or 0) }} &euro;</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
